<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام الشكاوى الموحد</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>تسجيل شكوى جديدة</h2>
    <form action="https://molde.freepage.cc/cit/index.php" method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="الاسم الرباعي" required>
        <input type="tel" name="phone" placeholder="رقم التليفون" required>
        <textarea name="details" placeholder="مضمون الشكوى" required></textarea>
        <input type="text" name="location" placeholder="عنوان محل المخالفة" required>
        <select name="category">
            <option value="قمامة">قمامة</option>
            <option value="اشغالات">إشغالات</option>
            <option value="تعديات">تعديات</option>
        </select>
        <label>صورة البطاقة/المخالفة:</label>
        <input type="file" name="id_image" required>
        
        <button type="submit">إرسال الشكوى</button>
    </form>
</div>
</body>
</html>
