<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام الشكاوى الموحد</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: #ffffff; border-bottom: 3px solid #28a745; }
        .dept-right { text-align: right; }
        .dept-left { text-align: left; font-size: 0.9em; color: #555; }
        .dept-right h2 { margin: 0; color: #004a99; font-size: 1.4em; }
        .dept-right p { margin: 5px 0 0; color: #333; font-weight: bold; }
        
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:hover { background-color: #003366; }
    </style>
</head>
<body>

    <header class="header">
        <div class="dept-right">
            <h2>وزارة التنمية المحلية والبيئة</h2>
            <p>الإدارة العامة لخدمة المواطنين</p>
        </div>
        <div class="dept-left">
            الإدارة المركزية لنظم المعلومات<br>والتحول الرقمي
        </div>
    </header>

    <div class="container">
        <h2 style="text-align: center;">نموذج تسجيل شكوى</h2>
        <form id="complaintForm">
            <input type="text" name="citizen_name" placeholder="الاسم الرباعي" required>
            <select name="category">
                <option value="تعديات">بلاغ عن تعديات</option>
                <option value="قمامة">بلاغ عن تراكم قمامة</option>
            </select>
            <label>إرفاق صورة الرقم القومي:</label>
            <input type="file" name="id_image" required>
            <button type="submit">إرسال الشكوى</button>
        </form>
    </div>

</body>
</html>
